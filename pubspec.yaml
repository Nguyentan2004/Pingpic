name: pingpic
description: "LocketWeb - A real-time photo sharing app built with Flutter Web."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # ─── State Management ───────────────────────────────────────────
  provider: ^6.1.2

  # ─── Navigation (Web-friendly, deep-linking support) ────────────
  go_router: ^14.3.0

  # ─── Google Fonts ───────────────────────────────────────────────
  google_fonts: ^6.2.1               # Inter, Roboto, etc. từ CDN

  # ─── Firebase (Hệ sinh thái mới) ─────────────────────────────
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0

  # ─── Image Handling ─────────────────────────────────────────────
  image_picker: ^1.1.2               # Chọn ảnh từ thiết bị / camera
  image_picker_for_web: ^3.0.6       # Web-specific image picker
  cached_network_image: ^3.4.1       # Cache ảnh mạng (có placeholder)

  # ─── Local Storage ──────────────────────────────────────────────
  shared_preferences: ^2.5.5         # Lưu token, user prefs
  flutter_secure_storage: ^9.2.2     # Lưu JWT token an toàn

  # ─── UI / UX ────────────────────────────────────────────────────
  shimmer: ^3.0.0                    # Loading skeleton effect
  lottie: ^3.1.3                     # Lottie animations
  flutter_svg: ^2.0.10+1             # SVG asset support
  fluttertoast: ^8.2.8               # Toast notifications

  # ─── Overlay Editor ─────────────────────────────────────────────
  emoji_picker_flutter: ^4.4.0       # Emoji picker with categories + skin tones
  giphy_get: ^3.6.1+1                  # Giphy GIF picker

  # ─── Mobile / Camera ────────────────────────────────────────────
  camera: ^0.11.0
  permission_handler: ^11.3.1
  image: ^4.3.0

  # ─── Utilities ──────────────────────────────────────────────────
  intl: ^0.20.2                      # Định dạng ngày giờ / i18n
  equatable: ^2.0.7                  # Value equality cho entities/models
  uuid: ^4.5.1                       # Generate unique IDs

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.4.4                    # Mock objects cho unit test
  build_runner: ^2.4.13              # Code generation
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  web:
    generate: true
  windows:
    generate: true

flutter:
  uses-material-design: true
  generate: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
  # (Uncomment and add files before enabling)
